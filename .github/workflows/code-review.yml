name: Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main, develop]

jobs:
  request-copilot-review:
    name: Request Copilot Code Review
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Request Copilot code review
        uses: github/copilot-code-review-action@v1
        with:
          language: rust
